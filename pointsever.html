<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分系统升级通知</title>
    <style>
        body {
            font-family: "微软雅黑", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 2em auto;
            padding: 0 20px;
            background-color: #fff3f3;
        }

        .notification {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #e74c3c;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5em;
        }

        .highlight {
            color: #c0392b;
            font-weight: bold;
        }

        .new-features {
            background: #f8f9fa;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #2ecc71;
        }

        .btn {
            display: inline-block;
            background: #2ecc71;
            color: white!important;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #27ae60;
        }

        .steps {
            margin: 1.5rem 0;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="notification">
        <h1>📢 重要系统升级通知</h1>
        
        <p>亲爱的用户：</p>
        
        <p><span class="highlight">旧版积分系统已正式停止维护和服务支持</span>，我们推出了全新升级的积分系统，为您提供更安全、更稳定的服务。</p>

        <div class="new-features">
            <strong>新版主要升级：</strong>
            <ul>
                <li>支持个人中心修改账户昵称</li>
                <li>新增密码修改功能</li>
                <li>界面交互全面优化</li>
                <li>增强账户安全保护</li>
            </ul>
        </div>

        <p>请立即访问新版系统：</p>
        <a href="https://damian38665.github.io/url.html?url=https://damian38665.github.io/app/pointsever" 
           class="btn"
           target="_blank">
            🔗 进入新版积分系统
        </a>

        <div class="steps">
            <strong>使用指引：</strong>
            <ol>
                <li>点击上方按钮进入新系统</li>
                <li>登录后点击右上角个人头像</li>
                <li>选择"账户设置"修改信息</li>
                <li>建议立即更新登录密码</li>
            </ol>
        </div>

        <p style="color: #666; margin-top: 2rem;">
            ※ 如有任何问题，请通过系统内客服渠道联系我们<br>
            <small>系统版本：v2.2.1 (最新稳定版)</small>
        </p>
    </div>
</body>
</html>
