<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damian2012 的博客</title>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header {
            background-color: rgba(51, 51, 51, 0.8);
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box; /* 确保 padding 不会导致宽度超出 */
        }
        header h1 {
            margin: 0;
            flex: 1;
            white-space: nowrap; /* 防止标题换行 */
            font-size: 1.2em; /* 手机端标题字体大小 */
        }
        header button {
            background-color: #555;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            display: none; /* 默认隐藏返回按钮 */
            margin-left: 10px; /* 确保按钮不被遮挡 */
            white-space: nowrap; /* 防止按钮文字换行 */
            font-size: 0.9em; /* 手机端按钮字体大小 */
        }
        #archive-container {
            display: flex;
            gap: 10px;
            margin-left: 20px;
            flex: 2;
            overflow-x: auto; /* 如果归档文件夹过多，允许横向滚动 */
        }
        .archive-folder {
            background-color: #007bff;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap; /* 防止文件夹名称换行 */
            font-size: 0.9em; /* 手机端文件夹字体大小 */
        }
        .archive-folder:hover {
            background-color: #0056b3;
        }
        #quote {
            margin: 20px;
            margin-top: 80px; /* 为顶部栏留出空间 */
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 1.1em;
            color: #333;
        }
        #search-container {
            margin: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px; /* 为顶部栏留出空间 */
        }
        #search {
            padding: 10px;
            width: calc(100% - 130px);
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        #search:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        #search-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 1em;
        }
        #search-button:hover {
            background-color: #0056b3;
        }
        #blog-list {
            margin: 20px;
            margin-top: 20px; /* 为顶部栏留出空间 */
        }
        .blog-item {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .blog-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }
        .blog-item h2 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
            color: #333;
        }
        .blog-item p {
            margin: 0;
            color: #666;
            font-size: 1em;
            line-height: 1.6;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 24px;
            color: #fff;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #modal {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 90%; /* 手机端弹窗宽度限制 */
        }
        #modal button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #modal button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #modal button:hover:not(:disabled) {
            background-color: #0056b3;
        }
        #blog-content {
            margin: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: none; /* 默认隐藏 */
            margin-top: 100px; /* 为顶部栏留出空间 */
        }
        pre {
            position: relative;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 20px 0;
        }
        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .copy-button:hover {
            background-color: #0056b3;
        }
        code {
            font-family: Consolas, monospace;
            font-size: 0.9em;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 15px 0;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 1em; /* 手机端标题字体大小 */
            }
            header button {
                font-size: 0.8em; /* 手机端按钮字体大小 */
                padding: 5px 8px;
            }
            .archive-folder {
                font-size: 0.8em; /* 手机端文件夹字体大小 */
                padding: 5px 8px;
            }
            #quote {
                font-size: 1em; /* 手机端名言字体大小 */
                padding: 15px;
            }
            #search {
                font-size: 0.9em; /* 手机端搜索框字体大小 */
            }
            #search-button {
                font-size: 0.9em; /* 手机端搜索按钮字体大小 */
                padding: 8px 16px;
            }
            .blog-item h2 {
                font-size: 1.2em; /* 手机端文章标题字体大小 */
            }
            .blog-item p {
                font-size: 0.9em; /* 手机端文章描述字体大小 */
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Damian2012 的博客</h1>
        <div id="archive-container"></div>
        <button id="back-button" onclick="goBackToHome()">返回首页</button>
    </header>
    <div id="quote"></div>
    <div id="search-container">
        <input type="text" id="search" placeholder="搜索文章...">
        <button id="search-button" onclick="handleSearch()">搜索</button>
    </div>
    <div id="blog-list"></div>
    <div id="blog-content"></div>
    <div id="loading">
        <div class="loader"></div>
    </div>
    <div id="overlay">
        <div id="modal">
            <p id="modal-content">加载中...</p>
            <button id="modal-button" onclick="closeModal()" disabled>我知道了</button>
        </div>
    </div>

    <script>
        const giteeUser = 'damian2021';
        const accessToken = 'b5a96c2df3774e1a8ded0ff0cc54cdfa';
        const repo = 'blog';
        const folder = 'damian2012';

        let allBlogs = []; // 存储所有博客数据
        let archiveFolders = []; // 存储归档文件夹

        // 随机古诗文和名言
        const quotes = [
            "山重水复疑无路，柳暗花明又一村。",
            "人生自古谁无死，留取丹心照汗青。",
            "书籍是人类进步的阶梯。",
            "成功是失败之母。",
            "天行健，君子以自强不息。",
            "不积跬步，无以至千里；不积小流，无以成江海。",
            "知识就是力量。",
            "读万卷书，行万里路。",
            "业精于勤，荒于嬉；行成于思，毁于随。",
            "千里之行，始于足下。"
        ];

        document.addEventListener('DOMContentLoaded', function() {
            fetchBlogList();
            fetchArchiveFolders();
            fetchModalContent();
            showRandomQuote();
        });

        // 显示随机古诗文或名言
        function showRandomQuote() {
            const quoteDiv = document.getElementById('quote');
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            quoteDiv.textContent = randomQuote;
        }

        // 从 tt.txt 加载弹窗内容
        async function fetchModalContent() {
            const url = `https://gitee.com/api/v5/repos/${giteeUser}/${repo}/contents/${folder}/tt.txt`;
            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${accessToken}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const content = decodeBase64(data.content); // 解码 Base64
                document.getElementById('modal-content').textContent = content;
            } catch (error) {
                console.error('Error fetching modal content:', error);
                document.getElementById('modal-content').textContent = '欢迎来到我的博客(≧▽≦)';
            } finally {
                // 加载完成后启用按钮
                document.getElementById('modal-button').disabled = false;
            }
        }

        async function fetchBlogList(path = folder) {
            const url = `https://gitee.com/api/v5/repos/${giteeUser}/${repo}/contents/${path}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${accessToken}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                allBlogs = data.filter(blog => blog.name.endsWith('.md')); // 只保留 Markdown 文件
                displayBlogList(allBlogs);
            } catch (error) {
                console.error('Error fetching blog list:', error);
                alert('加载文章列表失败，请检查控制台日志。');
            } finally {
                document.getElementById('loading').style.display = 'none'; // 隐藏加载动画
            }
        }

        async function fetchArchiveFolders() {
            const url = `https://gitee.com/api/v5/repos/${giteeUser}/${repo}/contents/${folder}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${accessToken}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                archiveFolders = data.filter(item => item.type === 'dir'); // 只保留文件夹
                displayArchiveFolders(archiveFolders);
            } catch (error) {
                console.error('Error fetching archive folders:', error);
            }
        }

        function displayArchiveFolders(folders) {
            const archiveContainer = document.getElementById('archive-container');
            archiveContainer.innerHTML = ''; // 清空当前列表
            folders.forEach(folder => {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'archive-folder';
                folderDiv.textContent = folder.name;
                folderDiv.addEventListener('click', () => {
                    fetchBlogList(folder.path);
                    document.getElementById('back-button').style.display = 'block'; // 显示返回按钮
                });
                archiveContainer.appendChild(folderDiv);
            });
        }

        function displayBlogList(blogs) {
            const blogList = document.getElementById('blog-list');
            blogList.innerHTML = ''; // 清空当前列表
            if (blogs.length === 0) {
                blogList.innerHTML = '<p>没有找到文章。</p>';
                return;
            }
            blogs.forEach(blog => {
                const blogItem = document.createElement('div');
                blogItem.className = 'blog-item animate__animated animate__fadeIn';
                blogItem.innerHTML = `<h2>${blog.name.replace('.md', '')}</h2><p>${blog.path}</p>`;
                blogItem.addEventListener('click', () => {
                    blogItem.classList.add('animate__pulse'); // 点击时添加脉冲动画
                    setTimeout(() => {
                        blogItem.classList.remove('animate__pulse');
                    }, 500);
                    fetchBlogContent(blog.path);
                });
                blogList.appendChild(blogItem);
            });
        }

        async function fetchBlogContent(path) {
            const url = `https://gitee.com/api/v5/repos/${giteeUser}/${repo}/contents/${path}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${accessToken}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const content = decodeBase64(data.content); // 解码 Base64
                renderMarkdown(content); // 渲染 Markdown
                document.getElementById('back-button').style.display = 'block'; // 显示返回按钮
                document.getElementById('blog-list').style.display = 'none'; // 隐藏文章列表
                document.getElementById('blog-content').style.display = 'block'; // 显示文章内容
            } catch (error) {
                console.error('Error fetching blog content:', error);
                alert('加载文章内容失败，请检查控制台日志。');
            }
        }

        function decodeBase64(base64) {
            // 使用 decodeURIComponent 和 escape 处理中文字符
            return decodeURIComponent(
                atob(base64)
                    .split('')
                    .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
                    .join('')
            );
        }

        function renderMarkdown(content) {
            const blogContent = document.getElementById('blog-content');
            // 使用 marked.js 渲染 Markdown
            blogContent.innerHTML = marked.parse(content, {
                baseUrl: `https://gitee.com/${giteeUser}/${repo}/raw/master/${folder}/` // 设置图片的基准路径
            });
            // 使用 highlight.js 高亮代码块
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightBlock(block);
                // 添加复制按钮
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-button';
                copyButton.innerHTML = '<i class="fas fa-copy"></i>';
                copyButton.addEventListener('click', () => {
                    navigator.clipboard.writeText(block.textContent).then(() => {
                        showCustomAlert('代码已复制到剪贴板！');
                    }).catch(() => {
                        // 如果复制失败，使用备用方法
                        const textarea = document.createElement('textarea');
                        textarea.value = block.textContent;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        showCustomAlert('代码已复制到剪贴板！');
                    });
                });
                block.parentElement.appendChild(copyButton);
            });
        }

        function showCustomAlert(message, duration = 3000) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'custom-alert';
            alertDiv.textContent = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => {
                document.body.removeChild(alertDiv);
            }, duration);
        }

        function handleSearch() {
            const searchInput = document.getElementById('search').value.toLowerCase();
            const filteredBlogs = allBlogs.filter(blog => 
                blog.name.toLowerCase().includes(searchInput) || 
                blog.path.toLowerCase().includes(searchInput)
            );
            displayBlogList(filteredBlogs);
        }

        function goBackToHome() {
            window.location.reload(); // 刷新页面以返回首页
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
