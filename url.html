<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全验证 - 跳转中</title>
    <style>
        /* 全局样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 移除按钮默认高亮 */
        button, input, textarea, select, a {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* 容器样式 */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* 验证框样式 */
        .verification-box {
            border: 2px solid #e0e0e0;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .verification-box:hover {
            border-color: #2196F3;
        }

        .verification-box.verified {
            border-color: #4CAF50;
            background: #f5fff5;
        }

        /* 加载条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-bar-inner {
            width: 0;
            height: 100%;
            background: #2196F3;
            border-radius: 4px;
            transition: width 2s linear;
        }

        /* 状态文本 */
        .status-text {
            color: #666;
            margin: 10px 0;
            min-height: 24px;
        }

        /* 安全提示 */
        .safe-notice {
            color: #4CAF50;
            font-weight: bold;
            margin: 10px 0;
        }

        .unsafe-notice {
            color: #ff4444;
            font-weight: bold;
            margin: 10px 0;
        }

        /* 错误提示 */
        .error {
            color: #ff4444;
            font-weight: bold;
        }

        /* 小陈科技字样 */
        .brand {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>安全验证</h2>
        <p>请完成以下验证以继续访问</p>
        
        <div class="verification-box" onclick="verify()">
            <div class="status-text" id="status">✓ 点击方框验证人类身份</div>
        </div>

        <!-- 加载条 -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-bar-inner" id="progressBarInner"></div>
        </div>

        <!-- 跳转链接显示 -->
        <p id="targetUrlText"></p>

        <!-- 安全提示 -->
        <p id="safetyNotice"></p>

        <!-- 错误提示 -->
        <p id="errorText" class="error"></p>
    </div>

    <!-- 小陈科技字样 -->
    <div class="brand">小陈科技</div>

    <script>
        function getRedirectUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('url');

            if (!targetUrl) {
                showError('错误代码: -1');
                return null;
            }

            try {
                // 确保目标地址是完整的HTTPS URL
                let finalUrl = targetUrl.trim();
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                    finalUrl = 'https://' + finalUrl;
                }
                // 强制使用HTTPS
                finalUrl = finalUrl.replace('http://', 'https://');
                return finalUrl;
            } catch (error) {
                showError('错误：目标地址格式不正确');
                return null;
            }
        }

        function verify() {
            const box = document.querySelector('.verification-box');
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');
            const progressBarInner = document.getElementById('progressBarInner');
            const targetUrlText = document.getElementById('targetUrlText');
            const safetyNotice = document.getElementById('safetyNotice');

            // 添加已验证样式
            box.classList.add('verified');
            box.style.cursor = 'default';
            box.onclick = null;

            // 显示加载条
            progressBar.style.display = 'block';
            progressBarInner.style.width = '100%'; // 开始加载动画
            status.innerHTML = '✓ 验证成功！正在准备跳转...';

            // 获取目标URL
            const targetUrl = getRedirectUrl();
            if (!targetUrl) return;

            // 显示目标地址
            targetUrlText.innerHTML = `即将跳转至：<a href="${targetUrl}" target="_blank">${targetUrl}</a>`;

            // 检查目标地址是否安全
            if (targetUrl.includes('damian38665.github.io')) {
                safetyNotice.innerHTML = '<span class="safe-notice">您将前往的页面安全，放心前往</span>';
            } else {
                safetyNotice.innerHTML = '<span class="unsafe-notice">您前往的地址并没有被核实过，请注意安全</span>';
            }

            // 2秒后跳转
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 2000);
        }

        function showError(message) {
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
        }

        // 初始检查
        window.onload = function() {
            const targetUrl = getRedirectUrl();
            if (!targetUrl) {
                document.querySelector('.verification-box').style.display = 'none';
            }
        }
    </script>
</body>
</html>
