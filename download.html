<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小陈云盘 - 工作室共享文件</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #2980b9;
            --ripple-color: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .cloud-icon {
            font-size: 36px;
            color: var(--accent-color);
            margin-right: 15px;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            background: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f8f9ff;
        }

        .file-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 95%;
            height: 1px;
            background: #eee;
            transform: translateX(-50%);
        }

        .file-icon {
            font-size: 24px;
            width: 40px;
            color: var(--secondary-color);
            position: relative;
            z-index: 2;
        }

        .file-info {
            flex: 1;
            margin-left: 15px;
            position: relative;
            z-index: 2;
        }

        .file-name {
            font-weight: 500;
            color: var(--primary-color);
        }

        .file-details {
            font-size: 0.9em;
            color: #666;
            margin-top: 3px;
        }

        .loading {
            padding: 20px;
            text-align: center;
            color: #666;
            animation: pulse 1.5s infinite;
        }

        .breadcrumb {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: var(--secondary-color);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
            overflow: hidden;
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: var(--ripple-color);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadein {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container animate-fadein">
        <div class="header">
            <i class="fas fa-cloud cloud-icon"></i>
            <div>
                <h1>小陈云盘</h1>
                <p style="color: #666;">工作室共享文件系统</p>
            </div>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>
        <ul class="file-list" id="fileList"></ul>
        <div id="loading" class="loading">加载中...</div>
        <div id="error" class="error"></div>
    </div>

    <script>
        const GITEE_USER = 'damian2021';
        const ACCESS_TOKEN = 'b5a96c2df3774e1a8ded0ff0cc54cdfa';
        const REPO = 'sever666';
        const ROOT_PATH = 'panfiles';
        const BRANCH = 'master'; // 分支名称

        let currentPath = ROOT_PATH;
        let pathStack = [];

        const FILE_ICONS = {
            dir: 'fa-folder-open',
            pdf: 'fa-file-pdf',
            image: 'fa-file-image',
            zip: 'fa-file-zipper',
            code: 'fa-file-code',
            default: 'fa-file'
        };

        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - (button.offsetLeft + radius)}px`;
            circle.style.top = `${event.clientY - (button.offsetTop + radius)}px`;
            circle.classList.add("ripple");

            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) ripple.remove();

            button.appendChild(circle);
        }

        function getFileIcon(type, name) {
            if (type === 'dir') return FILE_ICONS.dir;
            const ext = name.split('.').pop().toLowerCase();
            if (['pdf'].includes(ext)) return FILE_ICONS.pdf;
            if (['zip', 'rar', '7z'].includes(ext)) return FILE_ICONS.zip;
            if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) return FILE_ICONS.image;
            if (['html', 'js', 'css'].includes(ext)) return FILE_ICONS.code;
            return FILE_ICONS.default;
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let unitIndex = 0;
            while (bytes >= 1024 && unitIndex < 3) {
                bytes /= 1024;
                unitIndex++;
            }
            return `${bytes.toFixed(unitIndex ? 1 : 0)} ${units[unitIndex]}`;
        }

        function updateBreadcrumb() {
            const parts = currentPath.split('/');
            let path = '';
            const breadcrumb = parts.map((part, index) => {
                path += (index > 0 ? '/' : '') + part;
                return { name: part, path: path };
            });

            document.getElementById('breadcrumb').innerHTML = breadcrumb
                .map(item => `<span class="breadcrumb-item" data-path="${item.path}">${item.name}</span>`)
                .join(' / ');

            document.querySelectorAll('.breadcrumb-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    createRipple(e);
                    setTimeout(() => {
                        currentPath = item.dataset.path;
                        loadFiles();
                    }, 200);
                });
            });
        }

        async function downloadFile(filePath) {
            try {
                // 使用代理服务器中转下载请求
                const proxyUrl = `https://cors-anywhere.herokuapp.com/https://gitee.com/${GITEE_USER}/${REPO}/raw/${BRANCH}/${filePath}`;
                const response = await fetch(proxyUrl, {
                    headers: {
                        'Referer': 'https://gitee.com' // 模拟 Gitee 的 Referer
                    }
                });

                if (!response.ok) throw new Error('下载失败');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filePath.split('/').pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('下载失败:', error);
                alert('文件下载失败，请稍后重试');
            }
        }

        async function loadFiles(path = currentPath) {
            try {
                document.getElementById('fileList').innerHTML = '';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').textContent = '';

                const apiUrl = `https://gitee.com/api/v5/repos/${GITEE_USER}/${REPO}/contents/${path}?access_token=${ACCESS_TOKEN}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('加载失败');
                const files = await response.json();

                document.getElementById('loading').style.display = 'none';
                
                files.sort((a, b) => b.type.localeCompare(a.type));
                
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item animate-fadein';
                    
                    const icon = getFileIcon(file.type, file.name);
                    const size = file.type === 'dir' ? '' : formatSize(file.size);
                    
                    li.innerHTML = `
                        <i class="fas ${icon} file-icon"></i>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-details">
                                ${size} ${file.type === 'dir' ? '文件夹' : ''}
                            </div>
                        </div>
                    `;

                    li.addEventListener('click', (e) => {
                        createRipple(e);
                        setTimeout(() => {
                            if (file.type === 'dir') {
                                pathStack.push(currentPath);
                                currentPath = file.path;
                                loadFiles();
                            } else {
                                downloadFile(file.path);
                            }
                        }, 200);
                    });

                    document.getElementById('fileList').appendChild(li);
                });

                updateBreadcrumb();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = `错误：${error.message}`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
