<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <title>文件浏览器</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hover-effect:hover { background-color: #f3f4f6; transform: scale(1.02); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">服务器文件浏览器</h1>
        <div class="bg-white p-6 rounded-lg shadow-md">
            <ul id="file-list" class="space-y-4"></ul>
            <p id="error-msg" class="text-red-500 mt-4 hidden">获取文件失败，请检查服务器配置或网络。</p>
        </div>
    </div>
    <script>
        const fileList = document.getElementById('file-list');
        const errorMsg = document.getElementById('error-msg');

        fetch('./')
           .then(res => {
                if (!res.ok) throw new Error(`HTTP错误！状态码：${res.status}`);
                return res.text();
            })
           .then(html => {
                console.log('服务器响应内容:', html); // 输出服务器响应内容到控制台
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const entries = doc.querySelectorAll('a:not([href="."]):not([href=".."])');

                if (entries.length === 0) {
                    errorMsg.textContent = '未找到文件，确认服务器目录索引已开启且有文件。';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                entries.forEach(link => {
                    const fileName = link.textContent.trim();
                    if (!fileName) return;

                    const listItem = document.createElement('li');
                    listItem.className = 'flex items-center justify-between p-4 border-b border-gray-200 hover-effect';

                    const span = document.createElement('span');
                    span.textContent = fileName;
                    span.className = 'text-gray-700 font-medium';

                    const download = document.createElement('a');
                    download.href = fileName;
                    download.download = fileName;
                    download.className = 'text-blue-500 hover:text-blue-700 flex items-center';
                    download.innerHTML = '<i class="fas fa-download mr-2"></i> 下载';

                    listItem.appendChild(span);
                    listItem.appendChild(download);
                    fileList.appendChild(listItem);
                });
            })
           .catch(err => {
                console.error('获取文件列表失败：', err);
                errorMsg.textContent = `获取文件失败：${err.message}`;
                errorMsg.classList.remove('hidden');
            });
    </script>
</body>
</html>
